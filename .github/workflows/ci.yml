name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DART_SDK_VERSION: "3.11.0"
  # Opt every JavaScript action into Node.js 24 ahead of GitHub's forced
  # rollout (June 2026). Removes the deprecation banner now and avoids
  # surprises when older actions get auto-upgraded.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_SDK_VERSION }}

      - name: Cache pub-cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ env.DART_SDK_VERSION }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ env.DART_SDK_VERSION }}-

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Run tests
        run: dart test
